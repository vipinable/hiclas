<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VocabTrainer — match the columns</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --good: #22c55e;
    --bad: #ef4444;
    --selected: #facc15;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 80px;
  }
  .wrap { width: 100%; max-width: 820px; }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 4px;
    letter-spacing: 0.3px;
  }
  .sub { color: var(--muted); margin-bottom: 24px; font-size: 0.95rem; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 0; }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
  select, button {
    font: inherit;
    color: inherit;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    width: 100%;
  }
  button {
    cursor: pointer;
    background: var(--accent);
    color: #0f172a;
    font-weight: 600;
    border: none;
    transition: filter 0.15s ease;
  }
  button:hover:not(:disabled) { filter: brightness(1.08); }
  button:disabled { cursor: default; opacity: 0.7; }
  .score {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    font-size: 0.95rem;
    color: var(--muted);
  }
  .score b { color: var(--text); }
  .board {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .col-title {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .col { display: grid; gap: 10px; }
  .tile {
    background: var(--panel-2);
    border: 2px solid var(--border);
    color: var(--text);
    text-align: left;
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
    font-size: 0.95rem;
    transition: border-color 0.12s ease, background 0.12s ease, transform 0.05s ease;
    width: 100%;
  }
  .tile.word { font-weight: 700; text-align: center; font-size: 1.05rem; }
  .tile:hover:not(:disabled):not(.matched) { border-color: var(--accent); }
  .tile.selected {
    border-color: var(--selected);
    background: rgba(250, 204, 21, 0.12);
  }
  .tile.matched {
    border-color: var(--good);
    background: rgba(34, 197, 94, 0.15);
    color: var(--muted);
    cursor: default;
    text-decoration: line-through;
    text-decoration-color: rgba(148, 163, 184, 0.5);
  }
  .tile.flash-bad {
    border-color: var(--bad);
    background: rgba(239, 68, 68, 0.18);
    animation: shake 0.35s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  .error {
    background: rgba(239, 68, 68, 0.12);
    color: var(--bad);
    border: 1px solid var(--bad);
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 16px;
    display: none;
    font-size: 0.9rem;
  }
  .done-banner {
    display: none;
    background: rgba(34, 197, 94, 0.12);
    color: var(--good);
    border: 1px solid var(--good);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 16px;
    text-align: center;
    font-weight: 600;
  }
  .footer-hint { color: var(--muted); font-size: 0.8rem; text-align: center; margin-top: 24px; }
  code { background: var(--panel-2); padding: 1px 6px; border-radius: 4px; font-size: 0.85rem; }
  @media (max-width: 520px) {
    .board { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>VocabTrainer</h1>
  <p class="sub">Click a word, then click the meaning that matches it. One point per correct match.</p>

  <div id="err" class="error"></div>

  <div class="panel">
    <div class="row">
      <div>
        <label for="listSelect">Word list</label>
        <select id="listSelect"><option>(loading…)</option></select>
      </div>
      <div>
        <label for="sizeSelect">Pairs per board</label>
        <select id="sizeSelect">
          <option value="4">4</option>
          <option value="6" selected>6</option>
          <option value="8">8</option>
          <option value="10">10</option>
        </select>
      </div>
      <div style="flex: 0 0 auto;">
        <button id="newBoardBtn" style="width: auto; padding: 10px 18px;">New board</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="score">
      <div>Score: <b id="score">0</b></div>
      <div>Matched: <b id="matched">0</b> / <b id="total">0</b></div>
      <div>Attempts: <b id="attempts">0</b></div>
    </div>
  </div>

  <div id="doneBanner" class="done-banner"></div>

  <div class="panel" id="boardPanel" style="display: none;">
    <div class="board">
      <div>
        <div class="col-title">Words</div>
        <div class="col" id="wordsCol"></div>
      </div>
      <div>
        <div class="col-title">Meanings</div>
        <div class="col" id="meaningsCol"></div>
      </div>
    </div>
  </div>

  <div class="footer-hint">
    Add new word lists by uploading <code>word,meaning</code> CSV files to the vocab S3 bucket.
  </div>
</div>

<script>
const els = {
  listSelect: document.getElementById("listSelect"),
  sizeSelect: document.getElementById("sizeSelect"),
  newBoardBtn: document.getElementById("newBoardBtn"),
  err: document.getElementById("err"),
  score: document.getElementById("score"),
  matched: document.getElementById("matched"),
  total: document.getElementById("total"),
  attempts: document.getElementById("attempts"),
  doneBanner: document.getElementById("doneBanner"),
  boardPanel: document.getElementById("boardPanel"),
  wordsCol: document.getElementById("wordsCol"),
  meaningsCol: document.getElementById("meaningsCol"),
};

let state = {
  list: "",
  selectedWordEl: null,
  matchedPairs: 0,
  totalPairs: 0,
  attempts: 0,
  score: 0,
  busy: false,
};

function showError(msg) {
  els.err.textContent = msg;
  els.err.style.display = msg ? "block" : "none";
}

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const j = await res.json(); if (j.error) msg = j.error; } catch (_) {}
    throw new Error(msg);
  }
  return res.json();
}

async function loadLists() {
  showError("");
  try {
    const data = await api("/lists");
    els.listSelect.innerHTML = "";
    (data.lists || []).forEach(k => {
      const opt = document.createElement("option");
      opt.value = k;
      opt.textContent = k;
      els.listSelect.appendChild(opt);
    });
    if (!data.lists || !data.lists.length) {
      els.listSelect.innerHTML = "<option>(no lists found)</option>";
    }
  } catch (e) {
    showError("Couldn't load word lists: " + e.message);
    els.listSelect.innerHTML = "<option>(error)</option>";
  }
}

function makeTile(text, kind) {
  const b = document.createElement("button");
  b.type = "button";
  b.className = `tile ${kind}`;
  b.textContent = text;
  b.dataset.value = text;
  return b;
}

async function newBoard() {
  showError("");
  els.doneBanner.style.display = "none";
  const list = els.listSelect.value;
  if (!list || list.startsWith("(")) {
    showError("Pick a word list first.");
    return;
  }
  const n = parseInt(els.sizeSelect.value, 10) || 6;
  try {
    const board = await api(`/board?list=${encodeURIComponent(list)}&n=${n}`);
    state.list = board.list;
    state.selectedWordEl = null;
    state.matchedPairs = 0;
    state.totalPairs = board.words.length;
    els.matched.textContent = "0";
    els.total.textContent = String(state.totalPairs);

    els.wordsCol.innerHTML = "";
    els.meaningsCol.innerHTML = "";
    board.words.forEach(w => {
      const t = makeTile(w, "word");
      t.addEventListener("click", () => onWordClick(t));
      els.wordsCol.appendChild(t);
    });
    board.meanings.forEach(m => {
      const t = makeTile(m, "meaning");
      t.addEventListener("click", () => onMeaningClick(t));
      els.meaningsCol.appendChild(t);
    });
    els.boardPanel.style.display = "block";
  } catch (e) {
    showError("Couldn't load a board: " + e.message);
  }
}

function onWordClick(t) {
  if (state.busy || t.classList.contains("matched")) return;
  if (state.selectedWordEl) state.selectedWordEl.classList.remove("selected");
  if (state.selectedWordEl === t) {
    state.selectedWordEl = null;
    return;
  }
  state.selectedWordEl = t;
  t.classList.add("selected");
}

async function onMeaningClick(t) {
  if (state.busy || t.classList.contains("matched")) return;
  if (!state.selectedWordEl) {
    // require word-first per the rules
    flashHint(t);
    return;
  }
  state.busy = true;
  const wordEl = state.selectedWordEl;
  const word = wordEl.dataset.value;
  const chosen = t.dataset.value;
  state.attempts += 1;
  els.attempts.textContent = String(state.attempts);

  try {
    const result = await api("/answer", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ list: state.list, word, chosen_meaning: chosen }),
    });
    if (result.is_correct) {
      wordEl.classList.remove("selected");
      wordEl.classList.add("matched");
      t.classList.add("matched");
      wordEl.disabled = true;
      t.disabled = true;
      state.selectedWordEl = null;
      state.matchedPairs += 1;
      state.score += result.points_awarded || 1;
      els.matched.textContent = String(state.matchedPairs);
      els.score.textContent = String(state.score);
      if (state.matchedPairs === state.totalPairs) finishRound();
    } else {
      flashBad(wordEl);
      flashBad(t);
      wordEl.classList.remove("selected");
      state.selectedWordEl = null;
    }
  } catch (e) {
    showError("Couldn't grade match: " + e.message);
  } finally {
    state.busy = false;
  }
}

function flashBad(el) {
  el.classList.add("flash-bad");
  setTimeout(() => el.classList.remove("flash-bad"), 380);
}

function flashHint(el) {
  // Subtle nudge that the user should pick a word first
  el.classList.add("flash-bad");
  setTimeout(() => el.classList.remove("flash-bad"), 200);
}

function finishRound() {
  const acc = state.attempts > 0
    ? Math.round((state.matchedPairs / state.attempts) * 100)
    : 100;
  els.doneBanner.textContent = `Board complete! ${state.matchedPairs} matched in ${state.attempts} attempts (${acc}% accuracy).`;
  els.doneBanner.style.display = "block";
}

els.newBoardBtn.addEventListener("click", newBoard);

loadLists();
</script>
</body>
</html>
