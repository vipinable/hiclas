<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Highly Classifieds</title>
  <style>
    /* Palette mirrors classified-nexus-ui: blue-600 accent, blue->emerald gradient bg, gray text scale */
    :root {
      --blue-50:#eff6ff; --blue-100:#dbeafe; --blue-600:#2563eb; --blue-700:#1d4ed8;
      --emerald-50:#ecfdf5;
      --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-400:#9ca3af; --gray-500:#6b7280;
      --gray-600:#4b5563; --gray-800:#1f2937; --gray-900:#111827;
      --muted:#64748b; --white:#ffffff;
      --radius:0.5rem;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--gray-900);
      min-height: 100vh;
      background: linear-gradient(to top right, var(--blue-50), var(--emerald-50));
    }

    /* Navbar */
    .navbar {
      width:100%; display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid var(--gray-200); background:var(--white);
      padding:0.75rem 2.5rem; box-shadow:0 1px 2px 0 rgba(0,0,0,0.05);
      position:sticky; top:0; z-index:30;
    }
    .brand { display:flex; align-items:center; gap:0.5rem; }
    .brand svg { color:var(--blue-600); width:1.75rem; height:1.75rem; margin-right:0.5rem; }
    .brand .name { font-weight:800; font-size:1.25rem; letter-spacing:-0.025em; color:var(--blue-700); }
    .brand .tag { color:var(--muted); margin-left:1rem; font-size:0.875rem; }
    @media (max-width:768px){ .brand .tag{ display:none; } }
    .nav-actions { display:flex; align-items:center; gap:1rem; }
    .btn {
      display:inline-flex; align-items:center; gap:0.5rem; cursor:pointer;
      border:0; border-radius:0.375rem; font-weight:600; font-size:0.9rem;
      padding:0.5rem 1rem; transition:transform .15s ease, background .15s ease;
    }
    .btn-primary { background:var(--blue-600); color:#fff; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1); }
    .btn-primary:hover { background:var(--blue-700); transform:scale(1.05); }
    .btn-outline { background:#fff; color:var(--gray-800); border:1px solid var(--gray-200); }
    .btn-outline:hover { background:var(--gray-100); }

    /* Main container */
    main { max-width:1420px; margin:0 auto; padding:0 2rem 4rem; }
    @media (max-width:768px){ main{ padding:0 0.5rem 4rem; } }

    /* Search bar */
    .searchbar {
      width:100%; display:flex; gap:1rem; align-items:center; justify-content:space-between;
      margin:2rem 0 1rem; padding:0 1rem; flex-wrap:wrap;
    }
    .search-left { display:flex; flex:1; align-items:center; gap:0.75rem; min-width:260px; }
    .search-left input {
      width:350px; max-width:100%; padding:0.55rem 0.75rem; border-radius:0.375rem;
      border:1px solid var(--gray-200); background:var(--gray-100); font-size:0.9rem;
      transition:background .2s ease;
    }
    .search-left input:focus { background:#fff; outline:none; }
    .search-right { display:flex; gap:0.75rem; align-items:center; }
    .search-right select {
      background:#fff; border:1px solid var(--gray-200); border-radius:0.375rem;
      padding:0.35rem 0.5rem; font-size:0.85rem;
    }

    /* Section heading */
    .section-title { font-size:1.5rem; font-weight:700; color:var(--gray-800); margin:0.5rem 0; }

    /* Grid */
    .grid {
      display:grid; grid-template-columns:repeat(1,minmax(0,1fr)); gap:1.5rem;
    }
    @media (min-width:640px){ .grid{ grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (min-width:768px){ .grid{ grid-template-columns:repeat(3,minmax(0,1fr)); } }
    @media (min-width:1280px){ .grid{ grid-template-columns:repeat(4,minmax(0,1fr)); } }

    /* Card */
    .card {
      background:#fff; border:1px solid var(--gray-100); border-radius:var(--radius);
      overflow:hidden; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);
      display:flex; flex-direction:column; cursor:pointer;
      transition:box-shadow .2s ease;
    }
    .card:hover { box-shadow:0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); }
    .card .imgwrap { aspect-ratio:4/3; background:var(--gray-100); overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .card .imgwrap img { width:100%; height:100%; object-fit:cover; transition:transform .3s ease, filter .3s ease; }
    .card:hover .imgwrap img { transform:scale(1.05); filter:brightness(0.95); }
    .card .body { padding:1rem; display:flex; flex-direction:column; flex:1; }
    .card .row1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.25rem; }
    .card .title { font-weight:600; font-size:1rem; color:var(--gray-900); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .card .price { font-weight:700; color:var(--blue-600); font-size:1.125rem; margin-left:0.5rem; }
    .card .loc { font-size:0.875rem; color:var(--gray-600); display:flex; align-items:center; gap:0.25rem; margin-bottom:0.25rem; }
    .card .loc svg { color:var(--gray-400); }
    .card .time { font-size:0.75rem; color:var(--gray-400); display:flex; align-items:center; gap:0.25rem; margin-top:auto; padding-top:0.25rem; }
    .badge { display:inline-block; font-size:0.7rem; color:var(--gray-500); border:1px solid var(--gray-200); border-radius:999px; padding:0.1rem 0.5rem; margin-top:0.5rem; align-self:flex-start; }

    .empty { text-align:center; padding:2rem 0; color:var(--gray-600); }

    /* Post dialog */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:50; padding:1rem; }
    .overlay.open { display:flex; }
    .dialog { background:#fff; border-radius:0.75rem; width:100%; max-width:480px; padding:1.5rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); }
    .dialog h2 { margin:0 0 0.25rem; font-size:1.25rem; font-weight:700; color:var(--gray-900); }
    .dialog p.sub { margin:0 0 1rem; font-size:0.85rem; color:var(--muted); }
    .dialog label { display:block; font-size:0.8rem; color:var(--gray-600); margin:0.6rem 0 0.25rem; }
    .dialog input, .dialog textarea, .dialog select {
      width:100%; padding:0.55rem 0.65rem; border-radius:0.375rem; border:1px solid var(--gray-200);
      background:var(--gray-100); font-size:0.9rem;
    }
    .dialog input:focus, .dialog textarea:focus, .dialog select:focus { background:#fff; outline:none; }
    .dialog .actions { display:flex; gap:0.75rem; margin-top:1.25rem; }
    .dialog .actions .btn { flex:1; justify-content:center; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="brand">
      <!-- Building2 (lucide) -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
      <span class="name">HighlyClassifieds Marketplace</span>
      <span class="tag">Buy &amp; sell locally</span>
    </div>
    <div class="nav-actions">
      <button class="btn btn-primary" id="open-post" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        Post a Listing
      </button>
    </div>
  </nav>

  <main>
    <!-- Search bar -->
    <form class="searchbar" id="search-form">
      <div class="search-left">
        <input id="search" placeholder="Search for items, e.g. iPhone, Sofa, Bike..." />
        <button type="submit" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span>Search</span>
        </button>
      </div>
      <div class="search-right">
        <select>
          <option>Nearby</option>
          <option>Within 10 miles</option>
          <option>Within 50 miles</option>
          <option>Nationwide</option>
        </select>
      </div>
    </form>

    <h2 class="section-title">Recently Listed</h2>
    <div id="grid" class="grid"><p class="empty">Loading…</p></div>
  </main>

  <!-- Post listing dialog -->
  <div class="overlay" id="post-overlay">
    <form class="dialog" id="new-listing">
      <h2>Post a Listing</h2>
      <p class="sub">Add your item to the marketplace.</p>
      <label for="title">Title</label>
      <input id="title" required maxlength="80" />
      <label for="price">Price ($)</label>
      <input id="price" type="number" min="0" step="0.01" />
      <label for="category">Category</label>
      <select id="category">
        <option value="general">General</option>
        <option value="electronics">Electronics</option>
        <option value="furniture">Furniture</option>
        <option value="vehicles">Vehicles</option>
        <option value="property">Property</option>
      </select>
      <label for="location">Location</label>
      <input id="location" placeholder="e.g. Amsterdam" />
      <label for="imageUrl">Image URL (optional)</label>
      <input id="imageUrl" type="url" placeholder="https://..." />
      <label for="description">Description</label>
      <textarea id="description" rows="3"></textarea>
      <div class="actions">
        <button type="button" class="btn btn-outline" id="cancel-post">Cancel</button>
        <button type="submit" class="btn btn-primary">Post listing</button>
      </div>
    </form>
  </div>

  <script>
    const API = '/api/listings';
    const grid = document.getElementById('grid');
    const overlay = document.getElementById('post-overlay');
    let allListings = [];

    const placeholder = 'data:image/svg+xml;utf8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect width="100%" height="100%" fill="#f3f4f6"/><text x="50%" y="50%" fill="#9ca3af" font-family="sans-serif" font-size="16" text-anchor="middle" dy=".3em">No image</text></svg>'
    );

    const pinIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>';
    const clockIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
      });
    }

    function timeAgo(ms) {
      if (!ms) return 'Recently';
      const diff = Date.now() - Number(ms);
      const h = Math.floor(diff / 3600000);
      const d = Math.floor(h / 24);
      if (d > 0) return d + ' day' + (d > 1 ? 's' : '') + ' ago';
      if (h > 0) return h + ' hour' + (h > 1 ? 's' : '') + ' ago';
      return 'Just now';
    }

    function render(items) {
      if (!items.length) { grid.innerHTML = '<p class="empty">No listings found. Be the first to post!</p>'; return; }
      grid.innerHTML = items.map(function (i) {
        const img = i.imageUrl ? i.imageUrl : placeholder;
        const price = i.price ? escapeHtml(String(i.price)) : '0';
        return '<article class="card" data-id="' + escapeHtml(i.id || '') + '">' +
          '<div class="imgwrap"><img src="' + img + '" alt="" loading="lazy" onerror="this.src=\'' + placeholder + '\'" /></div>' +
          '<div class="body">' +
            '<div class="row1">' +
              '<div class="title">' + escapeHtml(i.title || 'Untitled Item') + '</div>' +
              '<div class="price">$' + price + '</div>' +
            '</div>' +
            '<div class="loc">' + pinIcon + '<span>' + escapeHtml(i.location || 'Location not specified') + '</span></div>' +
            '<div class="time">' + clockIcon + '<span>' + escapeHtml(timeAgo(i.createdAt)) + '</span></div>' +
            (i.category ? '<span class="badge">' + escapeHtml(i.category) + '</span>' : '') +
          '</div>' +
        '</article>';
      }).join('');
    }

    function applySearch() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      if (!q) { render(allListings); return; }
      render(allListings.filter(function (i) {
        return (i.title || '').toLowerCase().includes(q) ||
               (i.location || '').toLowerCase().includes(q) ||
               (i.category || '').toLowerCase().includes(q);
      }));
    }

    async function load() {
      try {
        const res = await fetch(API);
        const data = await res.json();
        allListings = Array.isArray(data) ? data : (data.items || []);
        applySearch();
      } catch (e) {
        grid.innerHTML = '<p class="empty">Failed to load listings. Please try again.</p>';
      }
    }

    document.getElementById('search-form').addEventListener('submit', function (e) { e.preventDefault(); applySearch(); });
    document.getElementById('search').addEventListener('input', applySearch);

    document.getElementById('open-post').addEventListener('click', function () { overlay.classList.add('open'); });
    document.getElementById('cancel-post').addEventListener('click', function () { overlay.classList.remove('open'); });
    overlay.addEventListener('click', function (e) { if (e.target === overlay) overlay.classList.remove('open'); });

    document.getElementById('new-listing').addEventListener('submit', async function (e) {
      e.preventDefault();
      const payload = {
        title: document.getElementById('title').value,
        price: document.getElementById('price').value,
        category: document.getElementById('category').value,
        location: document.getElementById('location').value,
        imageUrl: document.getElementById('imageUrl').value,
        description: document.getElementById('description').value,
      };
      await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      e.target.reset();
      overlay.classList.remove('open');
      load();
    });

    load();
  </script>
</body>
</html>
