name: Deploy Classifieds (production)

# Triggered manually or on push to main.
# Each environment (eu, us) loads its config from the corresponding
# apps/classifieds/<env>/config.env folder, then deploys the CDK stack.
# GitHub Actions environments named 'eu' and 'us' are used so that
# environment-scoped secrets and approval gates can be configured in
# Settings > Environments.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which production environment to deploy"
        required: true
        type: choice
        options:
          - eu
          - us
          - both
        default: both

jobs:
  deploy-eu:
    if: ${{ github.event.inputs.target == 'eu' || github.event.inputs.target == 'both' }}
    name: Deploy — eu (eu-west-1)
    runs-on: ubuntu-latest
    environment: eu
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v3

      - name: Load eu environment config
        run: cat apps/classifieds/eu/config.env >> "$GITHUB_ENV"

      - name: Set AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.A_KEY }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.S_KEY }}" >> "$GITHUB_ENV"

      - name: Check aws cli
        run: aws --version && aws sts get-caller-identity --query Account --output text

      - name: Install aws cdk package
        run: npm install -g aws-cdk && cdk --version

      - name: Deploy stack
        working-directory: apps/classifieds
        env:
          SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
          SES_RECEIVE_DOMAIN: ${{ vars.SES_RECEIVE_DOMAIN }}
          CF_DOMAIN: ${{ vars.CF_DOMAIN }}
          CF_CERT_ARN: ${{ vars.CF_CERT_ARN }}
        run: |
          npm install
          CDK_CONTEXT=""
          if [ -n "$SES_FROM_EMAIL" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c sesFromEmail=$SES_FROM_EMAIL"
          fi
          if [ -n "$SES_RECEIVE_DOMAIN" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c sesReceiveDomain=$SES_RECEIVE_DOMAIN"
          fi
          if [ -n "$CF_DOMAIN" ] && [ -n "$CF_CERT_ARN" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c cfDomain=$CF_DOMAIN -c cfCertArn=$CF_CERT_ARN"
          fi
          cdk synth $CDK_CONTEXT
          cdk deploy --require-approval never $CDK_CONTEXT

  deploy-us:
    if: ${{ github.event.inputs.target == 'us' || github.event.inputs.target == 'both' }}
    name: Deploy — us (us-east-1)
    runs-on: ubuntu-latest
    environment: us
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v3

      - name: Load us environment config
        run: cat apps/classifieds/us/config.env >> "$GITHUB_ENV"

      - name: Set AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.A_KEY }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.S_KEY }}" >> "$GITHUB_ENV"

      - name: Check aws cli
        run: aws --version && aws sts get-caller-identity --query Account --output text

      - name: Install aws cdk package
        run: npm install -g aws-cdk && cdk --version

      - name: Deploy stack
        working-directory: apps/classifieds
        env:
          SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
          SES_RECEIVE_DOMAIN: ${{ vars.SES_RECEIVE_DOMAIN }}
          CF_DOMAIN: ${{ vars.CF_DOMAIN }}
          CF_CERT_ARN: ${{ vars.CF_CERT_ARN }}
        run: |
          npm install
          CDK_CONTEXT=""
          if [ -n "$SES_FROM_EMAIL" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c sesFromEmail=$SES_FROM_EMAIL"
          fi
          if [ -n "$SES_RECEIVE_DOMAIN" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c sesReceiveDomain=$SES_RECEIVE_DOMAIN"
          fi
          if [ -n "$CF_DOMAIN" ] && [ -n "$CF_CERT_ARN" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c cfDomain=$CF_DOMAIN -c cfCertArn=$CF_CERT_ARN"
          fi
          cdk synth $CDK_CONTEXT
          cdk deploy --require-approval never $CDK_CONTEXT
