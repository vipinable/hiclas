name: Deploy Classifieds (production)

# Dispatches deployments to the environment-specific repos:
#   vipinable/hiclas-eu  →  eu-west-1
#   vipinable/hiclas-us  →  us-east-1
#
# Each env repo checks out this repo at the specified ref and runs the CDK
# deploy with its own environment config and GitHub Actions environment secrets.
#
# Prerequisites:
#   - vipinable/hiclas-eu and vipinable/hiclas-us repos exist with deploy.yml
#   - GH_TOKEN secret has workflow:write access on both env repos

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which production environment to deploy"
        required: true
        type: choice
        options:
          - eu
          - us
          - both
        default: both
      hiclas_ref:
        description: "Branch or tag of this repo to deploy (default: main)"
        required: false
        type: string
        default: main

jobs:
  trigger-eu:
    if: ${{ github.event.inputs.target == 'eu' || github.event.inputs.target == 'both' }}
    name: Dispatch → hiclas-eu
    runs-on: ubuntu-latest
    steps:
      - name: Trigger eu deployment
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh workflow run deploy.yml \
            --repo vipinable/hiclas-eu \
            --ref main \
            --field hiclas_ref=${{ github.event.inputs.hiclas_ref || 'main' }}

  trigger-us:
    if: ${{ github.event.inputs.target == 'us' || github.event.inputs.target == 'both' }}
    name: Dispatch → hiclas-us
    runs-on: ubuntu-latest
    steps:
      - name: Trigger us deployment
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh workflow run deploy.yml \
            --repo vipinable/hiclas-us \
            --ref main \
            --field hiclas_ref=${{ github.event.inputs.hiclas_ref || 'main' }}
