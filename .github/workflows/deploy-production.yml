name: Deploy Classifieds (production)

# Deploys the classifieds app to the eu and/or us production environments.
# eu → apps/classifieds-eu  (eu-west-1)
# us → apps/classifieds-us  (us-east-1)
#
# Each app imports ClassifiedsStack from apps/classifieds and configures it
# with the environment-specific region and GitHub Actions environment secrets.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which production environment to deploy"
        required: true
        type: choice
        options:
          - eu
          - us
          - both
        default: both

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.A_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.S_KEY }}

jobs:
  deploy-eu:
    if: ${{ github.event.inputs.target == 'eu' || github.event.inputs.target == 'both' }}
    name: Deploy — eu (eu-west-1)
    runs-on: ubuntu-latest
    environment: eu
    defaults:
      run:
        shell: bash
    env:
      AWS_DEFAULT_REGION: eu-west-1
      APP_NAME: ${{ vars.APP_NAME || 'classifieds' }}
      ENV_NAME: eu
    steps:
      - uses: actions/checkout@v3

      - name: Check aws cli
        run: aws --version && aws sts get-caller-identity --query Account --output text

      - name: Install aws cdk package
        run: npm install -g aws-cdk && cdk --version

      - name: Deploy stack
        working-directory: apps/classifieds-eu
        env:
          SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
          SES_RECEIVE_DOMAIN: ${{ vars.SES_RECEIVE_DOMAIN }}
          CF_DOMAIN: ${{ vars.CF_DOMAIN }}
          CF_CERT_ARN: ${{ vars.CF_CERT_ARN }}
        run: |
          npm install
          CDK_CONTEXT=""
          if [ -n "$SES_FROM_EMAIL" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c sesFromEmail=$SES_FROM_EMAIL"
          fi
          if [ -n "$SES_RECEIVE_DOMAIN" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c sesReceiveDomain=$SES_RECEIVE_DOMAIN"
          fi
          if [ -n "$CF_DOMAIN" ] && [ -n "$CF_CERT_ARN" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c cfDomain=$CF_DOMAIN -c cfCertArn=$CF_CERT_ARN"
          fi
          cdk synth $CDK_CONTEXT
          cdk deploy --require-approval never $CDK_CONTEXT

  deploy-us:
    if: ${{ github.event.inputs.target == 'us' || github.event.inputs.target == 'both' }}
    name: Deploy — us (us-east-1)
    runs-on: ubuntu-latest
    environment: us
    defaults:
      run:
        shell: bash
    env:
      AWS_DEFAULT_REGION: us-east-1
      APP_NAME: ${{ vars.APP_NAME || 'classifieds' }}
      ENV_NAME: us
    steps:
      - uses: actions/checkout@v3

      - name: Check aws cli
        run: aws --version && aws sts get-caller-identity --query Account --output text

      - name: Install aws cdk package
        run: npm install -g aws-cdk && cdk --version

      - name: Deploy stack
        working-directory: apps/classifieds-us
        env:
          SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
          SES_RECEIVE_DOMAIN: ${{ vars.SES_RECEIVE_DOMAIN }}
          CF_DOMAIN: ${{ vars.CF_DOMAIN }}
          CF_CERT_ARN: ${{ vars.CF_CERT_ARN }}
        run: |
          npm install
          CDK_CONTEXT=""
          if [ -n "$SES_FROM_EMAIL" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c sesFromEmail=$SES_FROM_EMAIL"
          fi
          if [ -n "$SES_RECEIVE_DOMAIN" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c sesReceiveDomain=$SES_RECEIVE_DOMAIN"
          fi
          if [ -n "$CF_DOMAIN" ] && [ -n "$CF_CERT_ARN" ]; then
            CDK_CONTEXT="$CDK_CONTEXT -c cfDomain=$CF_DOMAIN -c cfCertArn=$CF_CERT_ARN"
          fi
          cdk synth $CDK_CONTEXT
          cdk deploy --require-approval never $CDK_CONTEXT
