name: Deploy Classifieds (dev)

on:
  push:
    branches:
      - dev
  # Manually trigger from Actions tab
  workflow_dispatch:
    inputs:
      sesReceiveDomain:
        description: "Domain to receive inbound email for (e.g. mail.example.com). Leave blank to skip email-receiving setup."
        required: false
        type: string
        default: ""

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.A_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.S_KEY }}
  AWS_DEFAULT_REGION: "us-east-1"
  ApplicationName: classifieds
  Environment: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: all
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v3

      - name: Check aws cli
        run: aws --version && aws sts get-caller-identity --query Account --output text

      - name: Install aws cdk package
        run: npm install -g aws-cdk && cdk --version

      - name: Check running versions
        run: echo "node:$(node --version), cdk:$(cdk --version)"

      - name: Deploy stack
        working-directory: app
        env:
          SES_RECEIVE_DOMAIN: ${{ github.event.inputs.sesReceiveDomain }}
        run: |
          npm install
          CDK_CONTEXT=""
          if [ -n "$SES_RECEIVE_DOMAIN" ]; then
            echo "Email receiving enabled for domain: $SES_RECEIVE_DOMAIN"
            CDK_CONTEXT="-c sesReceiveDomain=$SES_RECEIVE_DOMAIN"
          else
            echo "No sesReceiveDomain provided — email receiving setup will be skipped."
          fi
          cdk synth $CDK_CONTEXT
          cdk deploy --require-approval never $CDK_CONTEXT
